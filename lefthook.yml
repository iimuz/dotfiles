pre-commit:
  parallel: true
  commands:
    shfmt:
      glob: "*.sh"
      run: shfmt -w -i 2 -ci {staged_files} && git add {staged_files}
    shellcheck:
      glob: "*.sh"
      run: shellcheck {staged_files}
    taplo-format:
      glob: "*.toml"
      run: mise exec -- taplo format {staged_files} && git add {staged_files}
    prettier:
      glob: "*.md"
      run: mise exec -- prettier --write {staged_files} && git add {staged_files}
    markdownlint:
      glob: "*.md"
      run: mise exec -- markdownlint-cli2 {staged_files}
