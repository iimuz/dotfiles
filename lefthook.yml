pre-commit:
  jobs:
    - name: format
      glob: "**/*.{sh,toml,md,py}"
      stage_fixed: true
      run: mise run format -- {staged_files}
    - group:
        parallel: true
        jobs:
          - name: lint
            glob: "**/*.{sh,md,py}"
            run: mise run lint -- {staged_files}
          - name: test
            glob: "**/*.py"
            run: mise run test
