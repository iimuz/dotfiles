[tools]
"aqua:LuaLS/lua-language-server" = "3.18.2"
bats = "latest"
"npm:bash-language-server" = "5.6.0"
shfmt = "3.13.1"
shellcheck = "0.11.0"
"cargo:taplo-cli" = "0.10.0"
"npm:prettier" = "3.9.4"
"npm:markdownlint-cli2" = "0.23.0"
lefthook = "2.1.9"
uv = "0.11.26"

[env]
_.file = ".env"

[tasks.setup]
description = "lefthook の git hook をインストール"
run = '''
# git worktree においては、ルートリポジトリ側で lefthook が設定されていればいいのでスキップ
if [ -d ".git" ]; then
  lefthook install
fi
'''

[tasks."format:sh"]
description = "shfmt でシェルスクリプトを整形（--check で崩れを検査）"
usage = '''
arg "[files]" var=#true
flag "--check"
'''
run = '''
eval "set -- ${usage_files:-'./'}"
if [ -n "${usage_check:-}" ]; then
  shfmt -d -i 2 -ci "$@"
else
  shfmt -w -i 2 -ci "$@"
fi
'''

[tasks."format:toml"]
description = "taplo で TOML を整形（--check で崩れを検査）"
usage = '''
arg "[files]" var=#true
flag "--check"
'''
run = '''
eval "set -- ${usage_files:-'**/*.toml'}"
if [ -n "${usage_check:-}" ]; then
  taplo format --check "$@"
else
  taplo format "$@"
fi
'''

[tasks."format:md"]
description = "prettier で Markdown を整形（--check で崩れを検査）"
usage = '''
arg "[files]" var=#true
flag "--check"
'''
run = '''
eval "set -- ${usage_files:-'**/*.md'}"
if [ -n "${usage_check:-}" ]; then
  prettier --check "$@"
else
  prettier --write "$@"
fi
'''

[tasks."format:py"]
description = "ruff で Python を整形（--check で崩れを検査）"
usage = '''
arg "[files]" var=#true
flag "--check"
'''
run = '''
eval "set -- ${usage_files:-.}"
if [ -n "${usage_check:-}" ]; then
  uv run ruff format --check -- "$@"
else
  uv run ruff format -- "$@"
fi
'''

[tasks.format]
description = "全ファイルを整形"
depends = ["format:sh", "format:toml", "format:md", "format:py"]

[tasks."format:check"]
description = "全ファイルの整形崩れを検査"
depends = [
  "format:sh --check",
  "format:toml --check",
  "format:md --check",
  "format:py --check",
]

# shellcheck はフォルダや glob 指定を受け付けず、対象ファイルを明示的に渡す必要がある。
# そのため他タスクのようにツール自身の探索へ任せられず、git ls-files で一覧を生成している。
[tasks."lint:sh"]
description = "shellcheck でシェルスクリプトを検査"
usage = '''
arg "[files]" var=#true
'''
run = '''
files=${usage_files:-$(git ls-files -co --exclude-standard '*.sh' | tr '\n' ' ')}
if [ -z "$files" ]; then exit 0; fi
eval "set -- $files"
shellcheck --severity=error -- "$@"
'''

[tasks."lint:md"]
description = "markdownlint-cli2 で Markdown を検査"
usage = '''
arg "[files]" var=#true
'''
run = '''
eval "set -- ${usage_files:-'**/*.md'}"
markdownlint-cli2 "$@"
'''

[tasks."lint:py"]
description = "ruff で Python を検査"
usage = '''
arg "[files]" var=#true
'''
run = '''
eval "set -- ${usage_files:-.}"
uv run ruff check -- "$@"
'''

[tasks.lint]
description = "全ファイルを検査"
depends = ["lint:sh", "lint:md", "lint:py"]

[tasks."test:py"]
description = "pytest で Python テストを実行"
run = "uv run pytest"

[tasks."test:sh"]
description = "bats でシェルテストを実行"
run = "bats tests/"

[tasks.test]
description = "全テストを実行"
depends = ["test:py", "test:sh"]
