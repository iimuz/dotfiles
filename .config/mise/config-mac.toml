[tools]
awscli = { version = "2.35.4", symlink_bins = "true" }
bat = "0.26.1"
cargo-binstall = "1.20.0"
"cargo:tree-sitter-cli" = "0.26.8"                      # for neovim
claude = "2.1.187"
colima = "0.10.3"
delta = "0.19.2"
eza = "0.23.4"
fd = "10.4.2"
fzf = "0.73.1"
gh = "2.94.0"
"github:vifm/vifm" = "v0.14.4"
go = "1.26.4"
jq = "1.8.1"
lazygit = "v0.62.2"
lima = "v2.1.2"                                         # colima で必要
lua = "5.1.5"                                           # neovim luarocksで要求しているバージョンが5.1
node = "24.16.0"
"npm:@aikidosec/safe-chain" = "1.5.7"
"npm:@anthropic-ai/sandbox-runtime" = "0.0.54"          # for claude code
"npm:@github/copilot" = "1.0.61"
"npm:ccstatusline" = "2.2.19"                           # for claude code
"npm:ccusage" = "20.0.11"                                # for claude code
"npm:context-mode" = "1.0.162"                          # for claude code
"npm:mcp-remote" = "0.1.38"                             # for copilot
"npm:neovim" = "5.4.0"                                  # for neovim
"pipx:awslabs.aws-documentation-mcp-server" = "1.1.24"
"pipx:pynvim" = "0.6.0"                                 # for neovim
pnpm = "11.6.0"
python = "3.14.6"
ripgrep = "15.1.0"
rust = "1.96.0"
shellcheck = "0.11.0"
shfmt = "3.13.1"
uv = "0.11.21"
yq = "4.53.3"

[env]
ASDF_LUA_LUAROCKS_VERSION = "3.12.2" # 3.13.0 has corrupted rockspec (luarocks/luarocks#1851)
# UV_PYTHON = { value = "{{ tools.python.path }}", tools = true }

[settings]
activate_aggressive = true
experimental = true

[settings.npm]
package_manager = "pnpm"

[settings.pipx]
uvx = true
