[tools]
aws-vault = "7.2.0"
awscli = { version = "2.34.41", symlink_bins = "true" }
cargo-binstall = "1.18.1"
"cargo:tree-sitter-cli" = "0.26.8"                        # for neovim
claude = "2.1.128"
delta = "0.19.2"
fzf = "0.72.0"
gemini-cli = "0.41.1"
gh = "2.92.0"
"github:vifm/vifm" = "v0.14.3"
go = "1.26.2"
jq = "1.8.1"
lazygit = "0.61.1"
lua = "5.1.5"                                             # neovim luarocksで要求しているバージョンが5.1
node = "24.15.0"
neovim = "0.12.2"
opencode = "v1.14.31"
"npm:@aikidosec/safe-chain" = "1.5.1"
"npm:@anthropic-ai/sandbox-runtime" = "v0.0.49"
"npm:ccstatusline" = "2.2.12"                             # for claude code
"npm:ccusage" = "v18.0.11"                                # for claude code
"npm:@github/copilot" = "1.0.40"
"npm:context-mode" = "1.0.103"                             # for opencode
"npm:mcp-remote" = "0.1.38"                               # for copilot
"npm:neovim" = "5.4.0"                                    # for neovim
"pipx:awslabs.aws-documentation-mcp-server" = "1.1.21"
"pipx:markitdown-mcp" = { version = "0.0.1a4", all = "" } # for copilot
"pipx:pynvim" = "0.6.0"                                   # for neovim
pnpm = "11.0.3"
python = "3.14.4"
rust = "1.95.0"
shellcheck = "0.11.0"
shfmt = "3.13.1"
ripgrep = "15.1.0"
uv = "0.11.8"
yq = "4.53.2"

[env]
ASDF_LUA_LUAROCKS_VERSION = "3.12.2" # 3.13.0 has corrupted rockspec (luarocks/luarocks#1851)
# UV_PYTHON = { value = "{{ tools.python.path }}", tools = true }

[settings]
activate_aggressive = true
experimental = true

[settings.npm]
package_manager = "pnpm"

[settings.pipx]
uvx = true
