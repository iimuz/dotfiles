[tools]
awscli = { version = "2.34.53", symlink_bins = "true" }
bat = "0.26.1"
cargo-binstall = "1.19.1"
"cargo:tree-sitter-cli" = "0.26.8"                      # for neovim
claude = "2.1.150"
delta = "0.19.2"
eza = "0.23.4"
fd = "10.4.2"
fzf = "0.73.0"
gh = "2.92.0"
"github:vifm/vifm" = "v0.14.3"
go = "1.26.3"
jq = "1.8.1"
lazygit = "0.61.1"
lua = "5.1.5"                                           # neovim luarocksで要求しているバージョンが5.1
neovim = "0.12.2"
node = "24.16.0"
"npm:@aikidosec/safe-chain" = "1.5.3"
"npm:@github/copilot" = "1.0.52"
"npm:ccstatusline" = "2.2.19"                           # for claude code
"npm:ccusage" = "20.0.4"                                # for claude code
"npm:context-mode" = "1.0.146"                          # for opencode
"npm:neovim" = "5.4.0"                                  # for neovim
"pipx:pynvim" = "0.6.0"                                 # for neovim
pnpm = "11.2.2"
python = "3.14.5"
ripgrep = "15.1.0"
rust = "1.95.0"
shellcheck = "0.11.0"
shfmt = "3.13.1"
uv = "0.11.16"
yq = "4.53.2"

[env]
ASDF_LUA_LUAROCKS_VERSION = "3.12.2" # 3.13.0 has corrupted rockspec (luarocks/luarocks#1851)
# UV_PYTHON = { value = "{{ tools.python.path }}", tools = true }

# fzf で利用する basepath を `/workspaces` に設定
FFGHQ_MAXDEPTH = 1
FFGHQ_MINDEPTH = 1
SOURCE_ROOT = "/workspaces"

[settings]
activate_aggressive = true
experimental = true

[settings.npm]
package_manager = "pnpm"

[settings.pipx]
uvx = true
